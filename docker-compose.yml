version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: detach-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U detach_10"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  postgres_data: